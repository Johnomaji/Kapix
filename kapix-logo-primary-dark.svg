<svg viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Kapix Primary Logo — Emerald on Dark -->
  <!-- Mark: Abstract K formed by decision pathways with central AI node -->
  <line x1="28" y1="20" x2="28" y2="100" stroke="#00D4AA" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="28" y1="60" x2="62" y2="60" stroke="#00D4AA" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="90" y2="24" stroke="#00D4AA" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="90" y2="96" stroke="#00D4AA" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Terminal nodes -->
  <circle cx="28" cy="20" r="4.5" fill="#00D4AA"/>
  <circle cx="28" cy="100" r="4.5" fill="#00D4AA"/>
  <circle cx="90" cy="24" r="4.5" fill="#00D4AA"/>
  <circle cx="90" cy="96" r="4.5" fill="#00D4AA"/>
  <!-- Central AI node (ring) -->
  <circle cx="62" cy="60" r="6.5" fill="#00D4AA"/>
  <circle cx="62" cy="60" r="3" fill="#060A12"/>
  <!-- Junction node -->
  <circle cx="28" cy="60" r="3.5" fill="#00D4AA"/>
  <!-- Wordmark -->
  <text x="120" y="72" font-family="'Anybody','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="46" fill="#FFFFFF" letter-spacing="-1">Kapix</text>
</svg>
